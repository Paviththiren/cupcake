<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/assets/app-icon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital@1&display=swap" rel="stylesheet">

    
    
    <title> Cupcake </title>
  </head>
  <body>
    <header>
      
    </header>
    <main>
      <div id="layoutShell">
        <div id="gameShell">
          <canvas id="gameCanvas"></canvas>
          <img src="assets/game-frame.png" alt="Frame" id="canvasFrame" />
        </div>
        <div id="recipeScroll">
          <img src="assets/recipe-scroll.png" alt="Scroll" id="scrollImage" />
          <div id="recipeText">
          </div>
        </div>
      </div>
<!-- Game Over Popup -->
<div id="gameOverPopup" style="
  display: none;
  position: absolute;
  top: -20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  text-align: center;
">
  <img src="assets/game-over-popup.png"
       alt="Game Over"
       style="width: 1024px; height: auto; display: block;" />

  <!-- QR Code container (LEFT side) -->
  <div id="qrCodeContainer" style="
    position: absolute;
    top: 337px;   /* adjust as needed */
    left: 160px;  /* adjust as needed */
    width: 180px;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 21;
  "></div>
  <!-- ChatGPT feedback (RIGHT side) -->
  <div id="gameOverText" style="
    width: 340px;
    margin-left: 425px;
    margin-top: -450px;
    text-align: justify;
    font-size: 20px;
    color: #4b2d0f;
    font-family: 'Comic Neue', cursive;
    font-style: italic;
  "></div>
</div>

<!-- Try Again Button -->
<div id="gameOverButtonWrapper" style="
  display: none;
  position: absolute;
  top: 500px;
  left: 908px;
  transform: translateX(-50%);
  z-index: 21;
  text-align: center;
">
  <button id="restartButton" style="
    all: unset;
    cursor: pointer;
    display: block;
    margin: 0 auto;
  ">
    <img src="assets/play-again-button.png"
         alt="Play Again"
         style="width: 200px; height: auto; display: block;" />
  </button>
</div>
    </main>
    <footer>
     
    </footer>
    <script type="module" src="/main.js"></script>
  </body>
</html>
